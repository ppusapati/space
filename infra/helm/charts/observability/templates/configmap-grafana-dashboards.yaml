{{/*
ConfigMap that ships the five chetana dashboards. Mounted by the
Grafana Pod at /etc/grafana/provisioning/dashboards. The
dashboards.yaml provider file points Grafana at the same mount.

REQ-NFR-OBS-003 / TASK-P1-OBS-001 acceptance #1: helm upgrade
applies the dashboards via this ConfigMap; Grafana shows them on
boot with no manual import.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observability.fullname" . }}-grafana-dashboards
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: dashboards
    chetana.observability/role: dashboard-source
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: chetana
        orgId: 1
        folder: Chetana
        type: file
        disableDeletion: true
        editable: false
        updateIntervalSeconds: 60
        options:
          path: /etc/grafana/provisioning/dashboards
  iam.json: |-
{{ .Files.Get "../../../grafana/dashboards/iam.json" | indent 4 }}
  audit.json: |-
{{ .Files.Get "../../../grafana/dashboards/audit.json" | indent 4 }}
  realtime-gw.json: |-
{{ .Files.Get "../../../grafana/dashboards/realtime-gw.json" | indent 4 }}
  notify.json: |-
{{ .Files.Get "../../../grafana/dashboards/notify.json" | indent 4 }}
  export.json: |-
{{ .Files.Get "../../../grafana/dashboards/export.json" | indent 4 }}
