version: v2
# This is a minimal buf.yaml for the proto package.
# The actual proto sources live in the backend repo.
# buf.gen.yaml uses `inputs` to reference them.
deps:
  - buf.build/bufbuild/protovalidate
  - buf.build/googleapis/googleapis
lint:
  use:
    - DEFAULT
  except:
    - FIELD_NOT_REQUIRED
    - PACKAGE_NO_IMPORT_CYCLE
breaking:
  use:
    - FILE
