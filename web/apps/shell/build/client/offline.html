<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4f46e5">
  <title>Offline - samavāya ERP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #4f46e5;
      --primary-light: #6366f1;
      --text: #1f2937;
      --text-light: #6b7280;
      --bg: #f9fafb;
      --white: #ffffff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      max-width: 480px;
      text-align: center;
      padding: 2rem;
      background: var(--white);
      border-radius: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 1.5rem;
      color: var(--primary);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    p {
      color: var(--text-light);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--white);
      background-color: var(--primary);
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn:hover {
      background-color: var(--primary-light);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .status {
      margin-top: 1.5rem;
      padding: 0.75rem;
      background-color: var(--bg);
      border-radius: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-light);
    }

    .status.online {
      background-color: #d1fae5;
      color: #065f46;
    }

    .status.offline {
      background-color: #fee2e2;
      color: #991b1b;
    }

    .cached-pages {
      margin-top: 1.5rem;
      text-align: left;
    }

    .cached-pages h3 {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .cached-pages ul {
      list-style: none;
      padding: 0;
    }

    .cached-pages li {
      padding: 0.5rem;
      border-radius: 0.25rem;
      margin-bottom: 0.25rem;
    }

    .cached-pages a {
      color: var(--primary);
      text-decoration: none;
    }

    .cached-pages a:hover {
      text-decoration: underline;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: #f9fafb;
        --text-light: #9ca3af;
        --bg: #111827;
        --white: #1f2937;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z" />
    </svg>

    <h1>You're Offline</h1>

    <p>
      It looks like you've lost your internet connection.
      Some features may be limited until you're back online.
    </p>

    <button class="btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 11-6.219-8.56" />
      </svg>
      Try Again
    </button>

    <div class="status" id="status">
      Checking connection...
    </div>

    <div class="cached-pages" id="cached-pages" style="display: none;">
      <h3>Available Offline:</h3>
      <ul id="cached-list"></ul>
    </div>
  </div>

  <script>
    // Check online status
    function updateStatus() {
      const statusEl = document.getElementById('status');
      if (navigator.onLine) {
        statusEl.className = 'status online';
        statusEl.textContent = 'Connection restored! Reloading...';
        setTimeout(() => window.location.reload(), 1000);
      } else {
        statusEl.className = 'status offline';
        statusEl.textContent = 'No internet connection';
      }
    }

    // List cached pages
    async function listCachedPages() {
      try {
        const cache = await caches.open('samavāya-erp-v1');
        const requests = await cache.keys();
        const pages = requests
          .filter(req => req.url.endsWith('/') || req.url.includes('.html'))
          .map(req => new URL(req.url).pathname);

        if (pages.length > 0) {
          const container = document.getElementById('cached-pages');
          const list = document.getElementById('cached-list');

          container.style.display = 'block';
          list.innerHTML = pages.map(page =>
            `<li><a href="${page}">${page === '/' ? 'Home' : page}</a></li>`
          ).join('');
        }
      } catch (error) {
        console.log('Could not list cached pages:', error);
      }
    }

    // Initialize
    updateStatus();
    listCachedPages();

    // Listen for online/offline events
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
  </script>
</body>
</html>
