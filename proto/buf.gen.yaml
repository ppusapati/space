version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/ppusapati/space/api
  disable:
    - module: buf.build/bufbuild/protovalidate
plugins:
  - remote: buf.build/protocolbuffers/go
    out: ../api
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go
    out: ../api
    opt:
      - paths=source_relative
