syntax = "proto3";

package p9e.space.common.v1;

import "google/protobuf/timestamp.proto";

// Pagination request fragment carried by every List RPC.
message PageRequest {
  // Maximum number of items to return. Server clamps to [1, 1000].
  int32 page_size = 1;
  // Opaque cursor returned by a previous response, or empty for the first page.
  string page_token = 2;
}

// Pagination response fragment carried by every List response.
message PageResponse {
  // Cursor for the next page, or empty when no more results.
  string next_page_token = 1;
  // Optional total count when the underlying repository can compute it cheaply.
  int64 total_size = 2;
}

// Audited timestamps attached to every persistent entity.
message AuditFields {
  // Wall-clock time the row was created. Server-set.
  google.protobuf.Timestamp created_at = 1;
  // Wall-clock time of the most recent update. Server-set.
  google.protobuf.Timestamp updated_at = 2;
  // ID of the principal who created the row. Server-set.
  string created_by = 3;
  // ID of the principal who last updated the row. Server-set.
  string updated_by = 4;
}
