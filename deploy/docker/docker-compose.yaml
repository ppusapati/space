# P9E Space — local development docker-compose.
#
# Brings up a single PostgreSQL instance with one database per service, all
# 17 ConnectRPC services, and a small set of supporting infrastructure
# (Kafka, Zookeeper, Redis) that the wider platform optionally consumes.
#
# Usage:
#   cd deploy/docker
#   docker compose up -d
#
# Each service is exposed on a unique host port in the 18000-18016 range
# (see ports: below). HTTP/Connect traffic is on the 8080 container port,
# Prometheus metrics on 9090.
#
# All services read their non-secret configuration from /etc/<svc>/config/
# config.yaml (baked into the image) and overlay the DATABASE_URL env var
# at startup.

name: p9e-space

x-service-defaults: &svc
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
  environment:
    LOG_LEVEL: info
    ENVIRONMENT: local
    HTTP_ADDR: ":8080"
    METRICS_ADDR: ":9090"
    SHUTDOWN_TIMEOUT: "30s"
    ALLOWED_ORIGINS: "*"

services:
  postgres:
    # TASK-P0-DB-001: TimescaleDB-HA bundles Postgres 16 + TimescaleDB +
    # PostGIS + pg_trgm in one image, matching the cluster-wide extension
    # contract in infra/atlas/migrations/0001_extensions.sql.
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: p9e
      POSTGRES_PASSWORD: p9e
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/home/postgres/pgdata
      - ./initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p9e"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------- Earth Observation ----------
  eo-catalog:
    <<: *svc
    image: p9e/eo-catalog:dev
    build:
      context: ../..
      dockerfile: services/eo-catalog/Dockerfile
    environment:
      LOG_LEVEL: info
      ENVIRONMENT: local
      HTTP_ADDR: ":8080"
      METRICS_ADDR: ":9090"
      SHUTDOWN_TIMEOUT: "30s"
      ALLOWED_ORIGINS: "*"
      DATABASE_URL: postgres://p9e:p9e@postgres:5432/eo_catalog?sslmode=disable
    ports: ["18000:8080"]

  eo-pipeline:
