version: v2
managed:
  enabled: true
  disable:
    - module: buf.build/bufbuild/protovalidate
inputs:
  - directory: proto
plugins:
  - remote: buf.build/protocolbuffers/go
    out: api
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go
    out: api
    opt:
      - paths=source_relative
