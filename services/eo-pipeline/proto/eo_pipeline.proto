syntax = "proto3";

package p9e.space.eopipeline.v1;

option go_package = "github.com/ppusapati/space/services/eo-pipeline/api;eopipelinev1";

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "fields.proto";
import "pagination.proto";

// =====================================================================
// EO Pipeline — orchestrates processing jobs (radiometric, geometric,
// atmospheric correction, pan-sharpening, mosaicking, SAR processing).
//
// A Job consumes one input scene and produces one output product.
// All identifiers are ULID strings (Crockford Base32, 26 chars).
// =====================================================================

enum JobStage {
  JOB_STAGE_UNSPECIFIED      = 0;
  JOB_STAGE_RADIOMETRIC      = 1;
  JOB_STAGE_GEOMETRIC        = 2;
  JOB_STAGE_ATMOSPHERIC      = 3;
  JOB_STAGE_PAN_SHARPEN      = 4;
  JOB_STAGE_MOSAIC           = 5;
  JOB_STAGE_SAR_SPECKLE      = 6;
  JOB_STAGE_SAR_TERRAIN      = 7;
  JOB_STAGE_SAR_POLARIMETRIC = 8;
}

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_PENDING     = 1;
  JOB_STATUS_RUNNING     = 2;
  JOB_STATUS_SUCCEEDED   = 3;
  JOB_STATUS_FAILED      = 4;
  JOB_STATUS_CANCELLED   = 5;
}

message Job {
  string id = 1;                // ULID
  string tenant_id = 2;         // ULID
  string item_id = 3;           // ULID — STAC item being processed
  JobStage stage = 4;
  JobStatus status = 5;
  string parameters_json = 6;
  string output_uri = 7;        // s3:// URI when SUCCEEDED
  string error_message = 8;     // when FAILED
  google.protobuf.Timestamp started_at = 9;
  google.protobuf.Timestamp finished_at = 10;
  packages.api.v1.fields.Fields fields = 11;
}

// ----- RPCs ---------------------------------------------------------------

message SubmitJobRequest {
  string tenant_id = 1 [(buf.validate.field).string = {len: 26}];
  string item_id = 2 [(buf.validate.field).string = {len: 26}];
  JobStage stage = 3 [(buf.validate.field).enum = {defined_only: true, not_in: [0]}];
  string parameters_json = 4;
}
message SubmitJobResponse { Job job = 1; }

message GetJobRequest {
  string id = 1 [(buf.validate.field).string = {len: 26}];
}
message GetJobResponse { Job job = 1; }

message ListJobsRequest {
  string tenant_id = 1 [(buf.validate.field).string = {len: 26}];
  optional JobStatus status = 2;
  optional JobStage stage = 3;
  packages.api.v1.pagination.PaginationRequest page = 4;
}
message ListJobsResponse {
  repeated Job jobs = 1;
  packages.api.v1.pagination.PaginationResponse page = 2;
}

message UpdateJobStatusRequest {
  string id = 1 [(buf.validate.field).string = {len: 26}];
  JobStatus status = 2 [(buf.validate.field).enum = {defined_only: true, not_in: [0]}];
  string output_uri = 3;
  string error_message = 4;
}
message UpdateJobStatusResponse { Job job = 1; }

message CancelJobRequest {
  string id = 1 [(buf.validate.field).string = {len: 26}];
}
message CancelJobResponse { Job job = 1; }

service PipelineService {
  rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);
  rpc GetJob(GetJobRequest) returns (GetJobResponse);
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
  rpc UpdateJobStatus(UpdateJobStatusRequest) returns (UpdateJobStatusResponse);
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);
}
