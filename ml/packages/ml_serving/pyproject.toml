[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ml_serving"
version = "0.1.0"
description = "Inference plumbing shared by eo_ml and gi_ml: model registry, predictor interface, batching, FastAPI server scaffolding."
requires-python = ">=3.11"
authors = [{ name = "P9E Microsystems Pvt Ltd" }]
license = { text = "Proprietary" }
readme = "README.md"
dependencies = [
    "numpy>=1.26",
    "onnxruntime>=1.17",
    "fastapi>=0.115",
    "pydantic>=2.5",
    "uvicorn>=0.30",
]

[project.optional-dependencies]
dev = ["pytest>=7", "httpx>=0.27"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
addopts = "-q --strict-markers"
testpaths = ["tests"]
