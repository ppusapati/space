[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gi_ml"
version = "0.1.0"
description = "Geospatial-intelligence predictive models: flood / drought risk indices, crop NDVI trend forecasting, urban-growth Markov-chain projection."
requires-python = ">=3.11"
authors = [{ name = "P9E Microsystems Pvt Ltd" }]
license = { text = "Proprietary" }
readme = "README.md"
dependencies = [
    "ml_serving>=0.1.0",
    "numpy>=1.26",
    "scikit-learn>=1.3",
]

[project.optional-dependencies]
dev = ["pytest>=7"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
addopts = "-q --strict-markers"
testpaths = ["tests"]
