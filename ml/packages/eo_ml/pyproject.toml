[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "eo_ml"
version = "0.1.0"
description = "Earth-observation deep-learning inference: pre-processing, sliding-window tiling, NMS, segmentation post-processing, ONNX detector / segmenter / classifier wrappers."
requires-python = ">=3.11"
authors = [{ name = "P9E Microsystems Pvt Ltd" }]
license = { text = "Proprietary" }
readme = "README.md"
dependencies = [
    "ml_serving>=0.1.0",
    "numpy>=1.26",
    "onnxruntime>=1.17",
]

[project.optional-dependencies]
dev = ["pytest>=7"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
addopts = "-q --strict-markers"
testpaths = ["tests"]
